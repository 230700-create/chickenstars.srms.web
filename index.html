<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallPlay - Firewall Patch</title>
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; font-family: 'Segoe UI', sans-serif; color: white; }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(59, 130, 246, 0.2); backdrop-filter: blur(10px); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row h-[85vh]">
        <!-- Sidebar -->
        <div class="w-full md:w-80 p-6 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col gap-6">
            <h1 class="text-2xl font-black text-blue-500 italic">CALLPLAY v2</h1>
            
            <div class="space-y-2">
                <p class="text-[10px] uppercase font-bold text-slate-500 tracking-tighter">1. Set Your Name</p>
                <input id="my-name" type="text" placeholder="Your Name" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm focus:border-blue-500 outline-none">
                <button onclick="goOnline()" id="online-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold text-sm transition-all">Go Online</button>
            </div>

            <div class="space-y-2">
                <p class="text-[10px] uppercase font-bold text-slate-500 tracking-tighter">2. Connect to Friend</p>
                <input id="friend-name" type="text" placeholder="Friend's Name" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="startChat()" class="bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-xs font-bold border border-slate-700">Chat</button>
                    <button onclick="startCall()" class="bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl text-xs font-bold">Video</button>
                </div>
            </div>

            <div id="status" class="mt-auto text-[11px] text-yellow-500 font-mono italic">Status: Offline</div>
        </div>

        <!-- Content -->
        <div class="flex-1 flex flex-col p-4 gap-4 overflow-hidden">
            <div class="grid grid-cols-2 gap-4 h-48 sm:h-64">
                <div class="bg-black rounded-2xl border border-slate-800 relative overflow-hidden">
                    <video id="local-v" autoplay muted playsinline class="w-full h-full object-cover"></video>
                    <div class="absolute bottom-2 left-2 bg-black/50 px-2 py-1 rounded text-[10px]">Me</div>
                </div>
                <div class="bg-black rounded-2xl border border-slate-800 relative overflow-hidden">
                    <video id="remote-v" autoplay playsinline class="w-full h-full object-cover"></video>
                    <div class="absolute bottom-2 left-2 bg-black/50 px-2 py-1 rounded text-[10px]">Friend</div>
                </div>
            </div>

            <div id="chat-box" class="flex-1 bg-slate-900/50 rounded-2xl p-4 overflow-y-auto flex flex-col gap-3 border border-slate-800">
                <div class="text-slate-600 text-center text-xs mt-10">Welcome! Go online to start.</div>
            </div>

            <div class="flex gap-2">
                <input id="msg-in" type="text" placeholder="Message..." class="flex-1 bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500">
                <button onclick="send()" class="bg-blue-600 px-6 rounded-xl hover:bg-blue-500 font-bold transition-all">Send</button>
            </div>
        </div>
    </div>

    <script>
        let peer, conn;
        const statusEl = document.getElementById('status');

        // Firewall Patch: Using Google and OpenRelay STUN/TURN servers
        const peerConfig = {
            config: {
                'iceServers': [
                    { 'urls': 'stun:stun.l.google.com:19302' },
                    { 'urls': 'stun:stun1.l.google.com:19302' },
                    { 'urls': 'stun:openrelay.metered.ca:80' }
                ]
            }
        };

        function goOnline() {
            const name = document.getElementById('my-name').value;
            if (!name) return alert("Enter a name first!");

            // Connecting with bypass config
            peer = new Peer(name, peerConfig);

            peer.on('open', (id) => {
                statusEl.innerText = "Status: Online as " + id;
                statusEl.className = "mt-auto text-[11px] text-green-400 font-mono italic";
                document.getElementById('online-btn').innerText = "Online";
                document.getElementById('online-btn').className = "w-full bg-green-900/30 text-green-400 py-3 rounded-xl font-bold cursor-default border border-green-800/50";
            });

            peer.on('connection', (c) => {
                conn = c;
                setupChat();
            });

            peer.on('call', async (call) => {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('local-v').srcObject = stream;
                call.answer(stream);
                call.on('stream', (remoteStream) => {
                    document.getElementById('remote-v').srcObject = remoteStream;
                });
            });

            peer.on('error', (err) => {
                statusEl.innerText = "Error: " + err.type;
                console.error(err);
            });
        }

        function startChat() {
            const friend = document.getElementById('friend-name').value;
            conn = peer.connect(friend);
            setupChat();
        }

        function setupChat() {
            conn.on('open', () => appendMsg("System", "Connected to friend!", "system"));
            conn.on('data', (data) => appendMsg("Friend", data, "friend"));
        }

        function send() {
            const msg = document.getElementById('msg-in').value;
            if (conn && msg) {
                conn.send(msg);
                appendMsg("Me", msg, "me");
                document.getElementById('msg-in').value = "";
            }
        }

        async function startCall() {
            const friend = document.getElementById('friend-name').value;
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-v').srcObject = stream;
            const call = peer.call(friend, stream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-v').srcObject = remoteStream;
            });
        }

        function appendMsg(who, text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = type === 'me' ? "bg-blue-600/20 border border-blue-500/50 self-end p-3 rounded-2xl rounded-tr-none max-w-[80%]" : 
                            type === 'system' ? "text-slate-500 text-[10px] text-center italic" : 
                            "bg-slate-800 border border-slate-700 self-start p-3 rounded-2xl rounded-tl-none max-w-[80%]";
            div.innerHTML = `<span class="text-[9px] uppercase font-bold block opacity-50 mb-1">${who}</span>${text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
