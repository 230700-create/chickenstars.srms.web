"></script>

<script>
    let peer, conn, localStream;
    const statusText = document.getElementById('status-text');

    // 1. Initial Media Setup
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => {
        localStream = s;
        document.getElementById('local-v').srcObject = s;
    });

    // 2. Global Lobby Logic
    function joinGlobal() {
        const room = document.getElementById('room-id').value || "Public";
        // Create a unique ID with a common prefix for discovery
        const myId = `${room}_${Math.random().toString(36).substr(2, 9)}`;
        
        peer = new Peer(myId, {
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (id) => {
            statusText.innerText = `Lobby: ${room}`;
            appendMsg("System", `Joined as ${id}. Looking for strangers...`, "system");
            findStrangers(room);
        });

        // Listen for strangers finding YOU
        peer.on('connection', c => { conn = c; setupChat(); });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
        });
    }

    // 3. Simple Discovery (Tries to connect to a neighbor)
    function findStrangers(room) {
        appendMsg("System", "Matching with random peer...", "system");
        // In a real 'serverless' lobby, you'd share IDs via a public board.
        // For this rebuild, users manually enter a 'Friend ID' or use a shared 'Room Name'.
        const target = document.getElementById('friend-name').value;
        if (target) {
            conn = peer.connect(target);
            setupChat();
            startCall(target);
        }
    }

    function setupChat() {
        conn.on('open', () => appendMsg("System", "Connected to stranger!", "system"));
        conn.on('data', data => appendMsg("Stranger", data, "peer"));
    }

    async function startCall(id) {
        const call = peer.call(id, localStream);
        call.on('stream', rs => document.getElementById('remote-v').srcObject = rs);
    }

    function sendMsg() {
        const input = document.getElementById('msg-in');
        if (conn && conn.open && input.value) {
            conn.send(input.value);
            appendMsg("You", input.value, "me");
            input.value = "";
        }
    }

    function appendMsg(who, text, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = type === 'me' ? "text-right" : "text-left";
        const color = type === 'me' ? "text-cyan-400" : (type === 'system' ? "text-zinc-500 italic" : "text-white");
        div.innerHTML = `<span class="text-[8px] font-black opacity-30 uppercase">${who}</span><p class="${color} font-bold text-sm">${text}</p>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
