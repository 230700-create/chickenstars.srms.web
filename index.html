<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALLPLAY | FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com');
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        .tuff-logo { font-family: 'Orbitron'; font-size: 2rem; background: linear-gradient(90deg, #ff0055, #00f2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px #ff0055); text-transform: uppercase; font-style: italic; }
        .glass { background: rgba(15, 15, 25, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        textarea { background: #0a0a0a !important; border: 1px solid #222 !important; color: #00f2ff !important; font-family: monospace; font-size: 10px; resize: none; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #ff0055; transition: 0.3s; }
        .active .status-dot { background: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass w-full max-w-6xl rounded-3xl overflow-hidden flex flex-col md:flex-row h-[90vh] shadow-2xl">
        <div class="w-full md:w-80 p-6 border-r border-white/5 flex flex-col gap-4">
            <h1 class="tuff-logo">CallPlay</h1>
            <button onclick="createOffer()" class="bg-white text-black py-3 rounded-xl font-black text-xs uppercase">1. Generate Signal</button>
            <textarea id="my-signal" readonly placeholder="Your signal..." class="w-full h-24 p-2 rounded-xl"></textarea>
            <button onclick="copySignal()" class="bg-zinc-800 py-2 rounded-lg text-[10px] font-bold">COPY SIGNAL</button>
            <div class="pt-4 border-t border-white/10">
                <p class="text-[10px] text-zinc-500 font-bold mb-2 uppercase">2. Paste Friend's Signal</p>
                <textarea id="friend-signal" placeholder="Paste here..." class="w-full h-24 p-2 rounded-xl"></textarea>
                <button onclick="connectFriend()" class="w-full bg-cyan-600 py-3 rounded-xl font-black text-xs mt-2 uppercase">Connect Link</button>
            </div>
            <div id="status-box" class="mt-auto pt-4 flex items-center gap-2 text-xs font-bold text-zinc-500 uppercase">
                <span class="status-dot"></span> <span id="status-text">Offline</span>
            </div>
        </div>
        <div class="flex-1 flex flex-col p-6 gap-6 bg-black/20">
            <div class="grid grid-cols-2 gap-4 h-1/2">
                <video id="local-v" autoplay muted playsinline class="bg-black rounded-3xl w-full h-full object-cover border border-white/5"></video>
                <video id="remote-v" autoplay playsinline class="bg-black rounded-3xl w-full h-full object-cover border border-cyan-500/20"></video>
            </div>
            <div class="flex-1 bg-white/[0.02] rounded-3xl p-6 flex flex-col gap-4 border border-white/5 overflow-hidden">
                <div id="chat-box" class="flex-1 overflow-y-auto space-y-2 text-xs"></div>
                <div class="flex gap-2 bg-black/60 p-2 rounded-2xl border border-white/10">
                    <input id="msg-in" type="text" placeholder="TRANSMIT..." class="flex-1 bg-transparent px-4 outline-none">
                    <button onclick="sendMsg()" class="bg-white text-black px-6 py-2 rounded-xl font-black text-[10px]">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
        let pc = new RTCPeerConnection(config);
        let dc;

        async function init() {
            const s = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('local-v').srcObject = s;
            s.getTracks().forEach(t => pc.addTrack(t, s));
        }
        init();

        pc.ontrack = e => { document.getElementById('remote-v').srcObject = e.streams[0]; };
        pc.ondatachannel = e => { dc = e.channel; setupDC(); };

        function setupDC() {
            dc.onopen = () => { 
                document.getElementById('status-box').classList.add('active');
                document.getElementById('status-text').innerText = "ONLINE";
            };
            dc.onmessage = e => append("Peer", e.data, "peer");
        }

        async function createOffer() {
            dc = pc.createDataChannel("chat");
            setupDC();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            pc.onicecandidate = e => { if(!e.candidate) document.getElementById('my-signal').value = JSON.stringify(pc.localDescription); };
        }

        async function connectFriend() {
            const sig = JSON.parse(document.getElementById('friend-signal').value);
            if(sig.type === "offer") {
                await pc.setRemoteDescription(new RTCSessionDescription(sig));
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                pc.onicecandidate = e => { if(!e.candidate) document.getElementById('my-signal').value = JSON.stringify(pc.localDescription); };
            } else {
                await pc.setRemoteDescription(new RTCSessionDescription(sig));
            }
        }

        function sendMsg() {
            const i = document.getElementById('msg-in');
            if(dc && i.value) { dc.send(i.value); append("You", i.value, "me"); i.value = ""; }
        }

        function append(u, t, type) {
            const b = document.getElementById('chat-box');
            b.innerHTML += `<div class="${type=='me'?'text-right':''}"><span class="opacity-50 font-bold">${u}:</span> ${t}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        function copySignal() {
            document.getElementById('my-signal').select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
